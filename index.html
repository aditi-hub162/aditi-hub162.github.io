<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>luvstella ✨</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button class="toggle" onclick="toggleMode()">🌙</button>

<header>
  <img src="logo.png" class="logo-img">
  <p>soft vibes • kawaii dreams • pastel world 🌙</p>
</header>

<section class="hero">
  <h2>Welcome to luvstella 💖</h2>
  <p>Your dreamy aesthetic universe</p>
  <a href="login.html"><button>Login 💌</button></a>
</section>

<!-- MUSIC -->
<section class="section">
  <h2>🎧 Music</h2>
  <audio controls>
    <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3">
  </audio>
</section>

<!-- SHOP -->
<section class="section">
  <h2>🛍️ Shop</h2>
  <div class="cards">

    <div class="card">
      <p>📓 Journal - ₹199</p>
      <button onclick="buy()">Buy</button>
    </div>

    <div class="card">
      <p>🎀 Stickers - ₹99</p>
      <button onclick="buy()">Buy</button>
    </div>

  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <h2>📸 Gallery</h2>
  <div class="gallery">
    <img src="https://picsum.photos/200?1">
    <img src="https://picsum.photos/200?2">
    <img src="https://picsum.photos/200?3">
  </div>
</section>

<!-- BLOG -->
<section class="section">
  <h2>📓 Blog</h2>
  <div class="cards">
    <div class="card">✨ journaling routine</div>
    <div class="card">🌙 night aesthetic</div>
  </div>
</section>

<!-- CONTACT -->
<section class="section">
  <h2>💌 Contact</h2>
  <form action="https://formspree.io/f/yourID" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button type="submit">Send 💗</button>
  </form>
</section>

<footer>
  <p>© luvstella ✨</p>
</footer>

<div class="stars"></div>
<div class="sparkles"></div>
<div class="hearts"></div>

<script src="script.js"></script>

</body>
</html>
