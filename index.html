<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>luvstella 💖</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#ffe6f2;
  transition:0.3s;
}

.dark {
  background:#1a1a2e;
  color:white;
}

header {
  padding:15px;
  background:pink;
}

input {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.products {
  display:flex;
  flex-wrap:wrap;
}

.card {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  width:150px;
}

.dark .card {
  background:#333;
}

</style>
</head>

<body>

<header>
  <h2>luvstella 💖</h2>
  <button onclick="toggleTheme()">🌙 Theme</button>
</header>

<!-- LOGIN -->
<div>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- SEARCH -->
<div>
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<!-- CONTACT -->
<div>
  <h3>Support 💌</h3>
  <textarea id="message"></textarea><br>
  <button onclick="sendMessage()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ofldumzfqanqjewhxfda.supabase.co",
  "sb_publishable_M4zzuAYfuUZAyhEMsqVIeA_1912eq85"
);

// LOGIN SYSTEM
async function signup(){
  let email = emailInput();
  let password = passwordInput();

  let {error} = await supabaseClient.auth.signUp({email,password});
  if(error) alert(error.message);
  else alert("Account created 💖");
}

async function login(){
  let email = emailInput();
  let password = passwordInput();

  let {error} = await supabaseClient.auth.signInWithPassword({email,password});
  if(error) alert(error.message);
  else loadProducts();
}

function emailInput(){
  return document.getElementById("email").value;
}

function passwordInput(){
  return document.getElementById("password").value;
}

// LOAD PRODUCTS
async function loadProducts(){
  let {data} = await supabaseClient.from("products").select("*");
  
  let html="";
  data.forEach(p=>{
    html += `
      <div class="card">
        <img src="${p.image}" width="100%">
        <h4>${p.name}</h4>
        <p>${p.price}</p>
        <button onclick="buy('${p.link}')">Buy</button>
      </div>
    `;
  });

  document.getElementById("productList").innerHTML = html;
}

// SEARCH
function searchProducts(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

// BUY
function buy(link){
  window.open(link);
}

// CONTACT MESSAGE
async function sendMessage(){
  let email = emailInput();
  let message = document.getElementById("message").value;

  await supabaseClient.from("messages").insert([{email,message}]);
  alert("Message sent 💖");
}

// THEME
function toggleTheme(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
